services:
  bot:
    build: .
    environment:
      VALKEY_HOST: "valkey"
      VALKEY_PORT: "6379"
      DISCORD_TOKEN: "${DISCORD_TOKEN}"
    networks:
      - internal
    depends_on:
      seed:
        condition: service_completed_successfully

  valkey:
    image: valkey/valkey:8
    networks:
      - internal
    volumes:
      - valkey-data:/data

  seed:
    build:
      context: .
      dockerfile: Dockerfile.seed
    environment:
      VALKEY_HOST: "valkey"
      VALKEY_PORT: "6379"
    networks:
      - internal
    depends_on:
      - valkey

networks:
  internal:
    driver: bridge

volumes:
  valkey-data: {}
