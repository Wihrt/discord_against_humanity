services:
  bot:
    build: .
    environment:
      MONGO_HOST: "mongo"
      MONGO_PORT: "27017"
      DISCORD_TOKEN: "${DISCORD_TOKEN}"
    networks:
      - internal
    depends_on:
      - mongo

  mongo:
    image: mongo:8
    networks:
      - internal
    volumes:
      - mongo-data:/data/db
      # Seed scripts – executed on first start only
      - ./mongo/mongo_init.sh:/docker-entrypoint-initdb.d/mongo_init.sh:ro
      - ./mongo/imports.txt:/docker-entrypoint-initdb.d/imports.txt:ro
      - ./mongo/seed:/docker-entrypoint-initdb.d/seed:ro

networks:
  internal:
    driver: bridge

volumes:
  mongo-data: {}
