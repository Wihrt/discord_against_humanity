name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check src/ tests/

  test:
    name: Pytest
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Run tests (unit + integration with testcontainers)
        env:
          # Ryuk is a testcontainers sidecar that cleans up containers
          # after tests. In CI the runner is ephemeral, so Ryuk is
          # unnecessary and may fail without a Docker socket. See:
          # https://testcontainers.com/guides/testcontainers-container-lifecycle/#_ryuk
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: uv run pytest --tb=short -q

  type-check:
    name: Type Check
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run mypy src/

  docker-build:
    name: Docker Build
    needs: type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: discord-against-humanity:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
